version: 2

project_name: twx

before:
  hooks:
    - go mod tidy

builds:
  - id: twx
    main: .
    binary: twx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jrarkaan/tmux-workspace/cmd.version={{.Version}}
      - -X github.com/jrarkaan/tmux-workspace/cmd.commit={{.Commit}}
      - -X github.com/jrarkaan/tmux-workspace/cmd.date={{.Date}}

archives:
  - id: twx
    ids:
      - twx
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: twx
    package_name: twx
    ids:
      - twx
    vendor: jrarkaan
    homepage: https://github.com/jrarkaan/tmux-workspace
    maintainer: jrarkaan
    description: Declarative tmux workspace manager for Ubuntu
    license: MIT
    formats:
      - deb
    bindir: /usr/bin
